; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = main
src_dir = apps

[env]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; monitor_port = socket://192.168.4.1:328

; ; Override standard upload to use a custom avrdude command over WiFi
; upload_protocol = custom
; upload_port = net:192.168.4.1:328
; upload_flags =
;     -C
;     $PROJECT_PACKAGES_DIR/tool-avrdude/avrdude.conf
;     -p
;     atmega328p
;     -c
;     arduino
;     -P
;     $UPLOAD_PORT
;     -b
;     115200
;     -D
; upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i -V

[env:main]
build_src_filter = -<*> +<main/*>
lib_deps = lennarthennigs/SimpleFSM@^1.3.1

[env:blink_fast]
build_src_filter = -<*> +<blink_fast/*>
lib_deps = lennarthennigs/SimpleFSM@^1.3.1

[env:gyro_test]
build_src_filter = -<*> +<gyro_test/*>
lib_deps =
  jrowberg/I2Cdevlib-Core
  jrowberg/I2Cdevlib-MPU6050

